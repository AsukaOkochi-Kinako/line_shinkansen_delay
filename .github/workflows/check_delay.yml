name: 東海道新幹線 遅延監視

on:
  schedule:
    # 毎日6〜23時（JST）の間、10分ごとに実行
    # UTC表記のため JST-9h = 21:00〜14:00 UTC
    - cron: '*/10 21-23 * * *'   # JST  6:00〜 8:50
    - cron: '*/10 0-14  * * *'   # JST  9:00〜23:50
  workflow_dispatch:              # 手動実行も可能

permissions:
  contents: write  # state.json をコミットするために必要

jobs:
  check-delay:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 遅延チェックと LINE 通知
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python check_delay.py

      - name: 状態ファイルをコミット
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update delay state [skip ci]"
          git push
